spring:
  application:
    name: labreserve-api
  profiles:
    active: dev

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:labreserve-jwt-secret-key-change-in-production-2026}
  expiration: 86400000

mybatis-plus:
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
---
# 开发环境配置
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mysql://localhost:3306/labreserve_dev?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME:labreserve}
    password: ${MYSQL_PASSWORD:labreserve123}
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms
      password: ${REDIS_PASSWORD:}
  cache:
    type: redis

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
---
# 生产环境配置
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${MYSQL_URL}
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: 6379
      timeout: 3000ms
      password: ${REDIS_PASSWORD}
  cache:
    type: redis

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
