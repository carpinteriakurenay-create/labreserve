              $ref: "#/components/schemas/BookingCreateRequest"
      responses:
        "201":
          $ref: "#/components/responses/Created"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: 时间冲突或该时段不可预约
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /bookings/{bookingId}:
    get:
      tags: [Bookings]
      summary: 预约详情
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 预约详情
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties:
                      data:
                        $ref: "#/components/schemas/Booking"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Bookings]
      summary: 修改预约 (F-18)
      description: 仅 PENDING 状态可修改
