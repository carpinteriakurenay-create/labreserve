openapi: "3.0.3"
info:
  title: LabReserve API
  description: 高校实验室预约管理系统 RESTful API
  version: "1.0.0"
  contact:
    name: LabReserve Team

servers:
  - url: http://localhost:8080/api
    description: 本地开发环境

tags:
  - name: Auth
    description: 认证与授权
  - name: Users
    description: 用户管理
  - name: Labs
    description: 实验室信息管理
  - name: LabHours
    description: 实验室开放时间
  - name: Bookings
    description: 预约管理
  - name: Equipment
    description: 设备管理
  - name: Borrows
    description: 设备借用管理
  - name: Courses
    description: 课程管理
  - name: Notices
    description: 通知公告
  - name: Reviews
    description: 实验室评价
  - name: UsageRecords
    description: 使用记录
  - name: Dashboard
    description: 数据统计报表
  - name: Students
    description: 学生信息管理
  - name: RepairLogs
    description: 报修记录
  - name: Health
    description: 系统健康

# ──────────────────────────────────────
# 安全定义
# ──────────────────────────────────────
security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        使用登录接口获取的 JWT token。
        Header: `Authorization: Bearer <token>`

  # ── 可复用响应 ──
  responses:
    Success:
      description: 操作成功
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiResponse"
    Created:
      description: 创建成功
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiResponse"
    NoContent:
      description: 删除成功（无响应体）
    BadRequest:
      description: 请求参数错误
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    Unauthorized:
      description: 未认证或 token 过期
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    Forbidden:
      description: 无权限
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    Conflict:
      description: 资源冲突（如时间冲突、重复预约）
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"

  # ── 可复用参数 ──
  parameters:
    CursorParam:
      name: cursor
      in: query
      schema:
        type: string
      description: 分页游标（上一页最后一条记录的 ID，首次不传）
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
      description: 每页条数

  # ──────────────────────────────────────
  # 数据模型（Schema）
  # ──────────────────────────────────────
  schemas:
    # ── 通用 ──
    ApiResponse:
      type: object
      required: [code, message, data]
      properties:
        code:
          type: string
          description: 业务状态码，"SUCCESS" 表示成功
          example: "SUCCESS"
        message:
          type: string
          description: 提示信息
          example: "操作成功"
        data:
          description: 响应数据

    ApiError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: 错误码
          example: "NOT_FOUND"
        message:
          type: string
          description: 错误描述
          example: "资源不存在"
        details:
          type: object
          description: 错误详情（如字段校验错误）
          additionalProperties: true

    CursorPageResult:
      type: object
      properties:
        records:
          type: array
          items: {}
        count:
          type: integer
        hasMore:
          type: boolean
        nextCursor:
          type: string
          nullable: true
        total:
          type: integer

    # ── 认证 ──
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          maxLength: 50
          example: "2021001"
        password:
          type: string
          minLength: 6
          maxLength: 100
          format: password
          example: "abc123"

    RegisterRequest:
      type: object
      required: [username, password, realName]
      properties:
        username:
          type: string
          maxLength: 50
          example: "2021001"
        password:
          type: string
          minLength: 6
          maxLength: 100
          format: password
        realName:
          type: string
          maxLength: 50
          example: "张三"
        email:
          type: string
          format: email
          maxLength: 100
        phone:
          type: string
          maxLength: 20

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT access token
        expiresIn:
          type: integer
          description: 过期时间（秒），86400 = 24h
        user:
          $ref: "#/components/schemas/UserInfo"

    UserInfo:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        realName:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        avatar:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        enabled:
          type: boolean

    UserRole:
      type: string
      enum: [STUDENT, TEACHER, ADMIN]

    # ── 用户 ──
    User:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        realName:
          type: string
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        role:
          $ref: "#/components/schemas/UserRole"
        avatar:
          type: string
          nullable: true
        enabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserCreateRequest:
      type: object
      required: [username, password, realName, role]
      properties:
        username:
          type: string
          maxLength: 50
        password:
          type: string
          minLength: 6
          maxLength: 100
        realName:
          type: string
          maxLength: 50
        role:
          $ref: "#/components/schemas/UserRole"
        email:
          type: string
          format: email
        phone:
          type: string

    UserUpdateRequest:
      type: object
      properties:
        realName:
          type: string
        email:
          type: string
        phone:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        enabled:
          type: boolean

    ChangePasswordRequest:
      type: object
      required: [oldPassword, newPassword]
      properties:
        oldPassword:
          type: string
        newPassword:
          type: string
          minLength: 6
          maxLength: 100

    # ── 实验室 ──
    LabStatus:
      type: string
      enum: [AVAILABLE, MAINTENANCE, CLOSED]

    Lab:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        location:
          type: string
        capacity:
          type: integer
        description:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        equipmentNum:
          type: integer
        status:
          $ref: "#/components/schemas/LabStatus"
        managerId:
          type: string
          nullable: true
        managerName:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    LabCreateRequest:
      type: object
      required: [name, location, capacity]
      properties:
        name:
          type: string
          maxLength: 100
        location:
          type: string
          maxLength: 200
        capacity:
          type: integer
          minimum: 1
        description:
          type: string
        imageUrl:
          type: string
        managerId:
          type: string

    LabUpdateRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        location:
          type: string
          maxLength: 200
        capacity:
          type: integer
          minimum: 1
        description:
          type: string
        imageUrl:
          type: string
        status:
          $ref: "#/components/schemas/LabStatus"
        managerId:
          type: string

    LabHours:
      type: object
      properties:
        id:
          type: string
        labId:
          type: string
        dayOfWeek:
          type: integer
          minimum: 1
          maximum: 7
        openTime:
          type: string
          pattern: "^\\d{2}:\\d{2}$"
        closeTime:
          type: string
          pattern: "^\\d{2}:\\d{2}$"

    LabHoursBatchRequest:
      type: object
      required: [labId, hours]
      properties:
        labId:
          type: string
        hours:
          type: array
          items:
            type: object
            required: [dayOfWeek, openTime, closeTime]
            properties:
              dayOfWeek:
                type: integer
                minimum: 1
                maximum: 7
              openTime:
                type: string
              closeTime:
                type: string

    # ── 预约 ──
    BookingStatus:
      type: string
      enum: [PENDING, APPROVED, REJECTED, CANCELLED, COMPLETED]

    Booking:
      type: object
      properties:
        id:
          type: string
        labId:
          type: string
        labName:
          type: string
        userId:
          type: string
        userName:
          type: string
        userRealName:
          type: string
        date:
          type: string
          format: date
        startTime:
          type: string
        endTime:
          type: string
        purpose:
          type: string
        personCount:
          type: integer
        status:
          $ref: "#/components/schemas/BookingStatus"
        rejectReason:
          type: string
          nullable: true
        approverId:
          type: string
          nullable: true
        approverName:
          type: string
        approvedAt:
          type: string
          nullable: true
          format: date-time
        completedAt:
          type: string
          nullable: true
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    BookingCreateRequest:
      type: object
      required: [labId, date, startTime, endTime, purpose]
      properties:
        labId:
          type: string
        date:
          type: string
          format: date
        startTime:
          type: string
          pattern: "^\\d{2}:\\d{2}$"
        endTime:
          type: string
          pattern: "^\\d{2}:\\d{2}$"
        purpose:
          type: string
          maxLength: 500
        personCount:
          type: integer
          minimum: 1
          default: 1

    BookingUpdateRequest:
      type: object
      properties:
        date:
          type: string
          format: date
        startTime:
          type: string
        endTime:
          type: string
        purpose:
          type: string
        personCount:
          type: integer

    ApprovalRequest:
      type: object
      required: [approved]
      properties:
        approved:
          type: boolean
        rejectReason:
          type: string
          description: 驳回时必填

    TimeSlot:
      type: object
      properties:
        startTime:
          type: string
        endTime:
          type: string
        available:
          type: boolean

    # ── 设备 ──
    EquipmentStatus:
      type: string
      enum: [AVAILABLE, BORROWED, MAINTENANCE]

    Equipment:
      type: object
      properties:
        id:
          type: string
        labId:
          type: string
        labName:
          type: string
        name:
          type: string
        model:
          type: string
          nullable: true
        serialNumber:
          type: string
        description:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/EquipmentStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    EquipmentCreateRequest:
      type: object
      required: [labId, name, serialNumber]
      properties:
        labId:
          type: string
        name:
          type: string
          maxLength: 100
        model:
          type: string
          maxLength: 100
        serialNumber:
          type: string
          maxLength: 100
        description:
          type: string

    EquipmentUpdateRequest:
      type: object
      properties:
        labId:
          type: string
        name:
          type: string
        model:
          type: string
        serialNumber:
          type: string
        description:
          type: string
        status:
          $ref: "#/components/schemas/EquipmentStatus"

    # ── 借用 ──
    BorrowStatus:
      type: string
      enum: [PENDING, APPROVED, REJECTED, BORROWING, RETURNED]

    Borrow:
      type: object
      properties:
        id:
          type: string
        equipmentId:
          type: string
        equipmentName:
          type: string
        userId:
          type: string
        userName:
          type: string
        userRealName:
          type: string
        borrowDate:
          type: string
          format: date
        expectedReturn:
          type: string
          format: date
        actualReturn:
          type: string
          nullable: true
          format: date
        purpose:
          type: string
        status:
          $ref: "#/components/schemas/BorrowStatus"
        rejectReason:
          type: string
          nullable: true
        approverId:
          type: string
          nullable: true
        approverName:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    BorrowCreateRequest:
      type: object
      required: [equipmentId, borrowDate, expectedReturn, purpose]
      properties:
        equipmentId:
          type: string
        borrowDate:
          type: string
          format: date
        expectedReturn:
          type: string
          format: date
        purpose:
          type: string
          maxLength: 500

    # ── 课程 ──
    Course:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        labId:
          type: string
        labName:
          type: string
        teacherId:
          type: string
        teacherName:
          type: string
        semester:
          type: string
        dayOfWeek:
          type: integer
        startTime:
          type: string
        endTime:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        className:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CourseCreateRequest:
      type: object
      required:
        [
          name,
          labId,
          teacherId,
          semester,
          dayOfWeek,
          startTime,
          endTime,
          startDate,
          endDate,
          className,
        ]
      properties:
        name:
          type: string
          maxLength: 100
        labId:
          type: string
        teacherId:
          type: string
        semester:
          type: string
          pattern: "^\\d{4}-\\d{4}-[12]$"
          example: "2025-2026-1"
        dayOfWeek:
          type: integer
          minimum: 1
          maximum: 7
        startTime:
          type: string
        endTime:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        className:
          type: string
          maxLength: 100

    CourseUpdateRequest:
      type: object
      properties:
        name:
          type: string
        labId:
          type: string
        teacherId:
          type: string
        dayOfWeek:
          type: integer
        startTime:
          type: string
        endTime:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        className:
          type: string

    # ── 通知 ──
    NoticeType:
      type: string
      enum: [GENERAL, LAB, EQUIPMENT]

    NoticePriority:
      type: string
      enum: [LOW, NORMAL, HIGH, URGENT]

    Notice:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        content:
          type: string
        type:
          $ref: "#/components/schemas/NoticeType"
        priority:
          $ref: "#/components/schemas/NoticePriority"
        publisherId:
          type: string
        publisherName:
          type: string
        labId:
          type: string
          nullable: true
        labName:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    NoticeCreateRequest:
      type: object
      required: [title, content]
      properties:
        title:
          type: string
          maxLength: 200
        content:
          type: string
        type:
          $ref: "#/components/schemas/NoticeType"
        priority:
          $ref: "#/components/schemas/NoticePriority"
        labId:
          type: string

    NoticeUpdateRequest:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        type:
          $ref: "#/components/schemas/NoticeType"
        priority:
          $ref: "#/components/schemas/NoticePriority"

    # ── 评价 ──
    Review:
      type: object
      properties:
        id:
          type: string
        bookingId:
          type: string
        userId:
          type: string
        userName:
          type: string
        userRealName:
          type: string
        labId:
          type: string
        labName:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ReviewCreateRequest:
      type: object
      required: [bookingId, rating]
      properties:
        bookingId:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
          maxLength: 500

    # ── 使用记录 ──
    UsageRecord:
      type: object
      properties:
        id:
          type: string
        bookingId:
          type: string
        labId:
          type: string
        labName:
          type: string
        userId:
          type: string
        userRealName:
          type: string
        date:
          type: string
          format: date
        startTime:
          type: string
        endTime:
          type: string
        purpose:
          type: string
        personCount:
          type: integer
        completedAt:
          type: string
          format: date-time

    # ── 仪表盘 ──
    DashboardKpi:
      type: object
      properties:
        todayBookings:
          type: integer
        todayBorrows:
          type: integer
        labUsageRate:
          type: number
          format: double
        pendingApprovals:
          type: integer

    LabUsageStat:
      type: object
      properties:
        labId:
          type: string
        labName:
          type: string
        bookingCount:
          type: integer
        usageHours:
          type: number
        utilizationRate:
          type: number

    EquipmentUsageStat:
      type: object
      properties:
        equipmentId:
          type: string
        equipmentName:
          type: string
        borrowCount:
          type: integer
        avgBorrowDays:
          type: number

    StudentRanking:
      type: object
      properties:
        userId:
          type: string
        userRealName:
          type: string
        bookingCount:
          type: integer
        totalHours:
          type: number

    # ── 学生信息 ──
    Gender:
      type: string
      enum: [MALE, FEMALE]

    Student:
      type: object
      properties:
        id:
          type: string
        labId:
          type: string
        labName:
          type: string
        name:
          type: string
        gender:
          $ref: "#/components/schemas/Gender"
        age:
          type: integer
          nullable: true
        address:
          type: string
          nullable: true
        creatorId:
          type: string
        creatorName:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    StudentCreateRequest:
      type: object
      required: [labId, name]
      properties:
        labId:
          type: string
        name:
          type: string
          maxLength: 50
        gender:
          $ref: "#/components/schemas/Gender"
        age:
          type: integer
        address:
          type: string

    StudentUpdateRequest:
      type: object
      properties:
        labId:
          type: string
        name:
          type: string
        gender:
          $ref: "#/components/schemas/Gender"
        age:
          type: integer
        address:
          type: string

    # ── 报修 ──
    RepairStatus:
      type: string
      enum: [PENDING, IN_PROGRESS, COMPLETED]

    RepairLog:
      type: object
      properties:
        id:
          type: string
        equipmentId:
          type: string
        equipmentName:
          type: string
        reporterId:
          type: string
        reporterName:
          type: string
        description:
          type: string
        status:
          $ref: "#/components/schemas/RepairStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RepairLogCreateRequest:
      type: object
      required: [equipmentId, description]
      properties:
        equipmentId:
          type: string
        description:
          type: string
          maxLength: 500

    # ── 导出 ──
    ExportRequest:
      type: object
      required: [resource, format]
      properties:
        resource:
          type: string
          enum: [bookings, borrows, usageRecords]
        format:
          type: string
          enum: [csv]
        filters:
          type: object

# ══════════════════════════════════════════
# 接口定义
# ══════════════════════════════════════════
paths:
  # ────────────────────────────────────
  # 1. 健康检查
  # ────────────────────────────────────
  /health:
    get:
      tags: [Health]
      summary: 服务健康检查
      security: []
      responses:
        "200":
          description: 服务正常
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "UP"
                  service:
                    type: string
                    example: "LabReserve API"
                  timestamp:
                    type: string
                    format: date-time

  # ────────────────────────────────────
  # 2. 认证模块
  # ────────────────────────────────────
  /auth/register:
    post:
      tags: [Auth]
      summary: 用户注册 (F-01)
      description: 新用户注册，默认 STUDENT 角色
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          $ref: "#/components/responses/Created"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: 用户名已存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/login:
    post:
      tags: [Auth]
      summary: 用户登录 (F-02)
      description: JWT 认证，返回 token（有效期 24h）和用户信息
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                allOf:
