    put:
      tags: [Bookings]
      summary: 审批预约 (F-14)
      description: |
        教师/管理员审批。
        自动检测时间冲突（与已审批预约 + 课程安排）。
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
