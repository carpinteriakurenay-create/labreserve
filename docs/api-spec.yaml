        通过 status 参数区分。
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/BookingStatus"
        - name: labId
          in: query
          schema:
            type: string
        - name: userId
          in: query
          schema:
            type: string
          description: 教师/管理员按申请人筛选
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
        - $ref: "#/components/parameters/CursorParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: 分页结果
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties:
                      data:
                        allOf:
                          - $ref: "#/components/schemas/CursorPageResult"
                          - properties:
                              records:
                                type: array
                                items:
                                  $ref: "#/components/schemas/Booking"
    post:
      tags: [Bookings]
      summary: 提交预约申请 (F-12)
      description: 学生/教师选择实验室、日期、时间段、用途
      requestBody:
        required: true
        content:
          application/json:
